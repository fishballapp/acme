name: E2E

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    # The `e2e` environment holds CLOUDFLARE_API_KEY / CLOUDFLARE_ZONE_ID and
    # requires manual approval, gating secret access for every run (including
    # fork PRs) while still testing the PR's own code.
    environment: e2e
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x # Run with latest stable Deno.
      - run: deno task test:e2e
        env:
          CLOUDFLARE_API_KEY: ${{secrets.CLOUDFLARE_API_KEY}}
          CLOUDFLARE_ZONE_ID: ${{secrets.CLOUDFLARE_ZONE_ID}}
